<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁こつこつ抽選メーカー</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>
<h1>🎁こつこつ抽選メーカー</h1>
<p>〜公平・簡単・爆速抽選〜</p>
</header>

<section class="card">

<h2>🎁企画情報</h2>

<input 
id="eventName"
type="text"
placeholder="企画名を入力">

<br><br>

<input 
id="prizeName"
type="text"
placeholder="賞品名を入力">


</section>
<section class="card">

<h2>👥 応募者入力</h2>

<textarea id="entryList"
placeholder="応募者を1行ずつ入力してください"></textarea>


<div class="count-area">

<label>🏆 当選人数</label>

<input 
id="winnerCount"
type="number"
value="1"
min="1">

</div>


<button id="drawButton">
🎲 抽選開始！
</button>


<button id="againButton" class="sub-button">
🔁 再抽選
</button>


</section>


<section class="card">

<h2>📊 結果</h2>

<div id="participantInfo">
応募者数：0名
</div>


<div id="result">
まだ抽選していません
</div>

<div id="shareCard">

<div class="share-logo">
🎁 こつこつ抽選メーカー
</div>


<div class="share-title">
🎉 当選発表 🎉
</div>


<div class="share-item">

🎯 企画名

<p id="shareEvent">
</p>

</div>


<div class="share-item">

🎁 賞品

<p id="sharePrize">
</p>

</div>


<div class="share-item">

🏆 当選者

<p id="shareWinner">
</p>

</div>


<div class="share-footer">

✨ ご参加ありがとうございました ✨

</div>


</div>


<button id="copyButton" class="copy-button">
📋 当選結果をコピー
</button>

<button id="imageButton" class="copy-button">
📸 当選画像を作成
</button>

</section>


<section class="card">

<h2>🏆 抽選履歴</h2>

<ul id="history"></ul>

</section>


</div>


<div id="confetti"></div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script src="script.js"></script>

</body>
</html>
